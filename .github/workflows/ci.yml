name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run nightly at 2 AM UTC (optional, for smoke tests)
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: npm run lint || echo "Lint not configured yet"

    - name: Unit tests
      run: npm run test:unit

    # Integration tests require OpenAI/SerpAPI keys — skip in CI by default
    # Uncomment and add secrets if you want full integration tests
    # - name: Integration tests
    #   env:
    #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    #     SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
    #   run: npm run test:integration

    - name: Build Docker image
      run: |
        docker build -t autoresearch-agent:test .
        docker images | grep autoresearch-agent

  # Optional: nightly smoke test with mock data (no API calls)
  nightly-smoke:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    - name: Install
      run: npm ci
    - name: Dry-run config validation
      run: node bin/cli.js "test topic" --dry-run
    - name: Check file structure
      run: |
        test -d agents
        test -d core
        test -d tools
        test -d ui
        test -d outputs
        echo "All directories present"
